<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한류클래스 — Từ vựng theo chủ đề</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f2fa;
            --surface: #ffffff;
            --text-main: #2e2b55;
            --text-sub: #7875a8;
            --text-muted: #aeacd0;
            --border: rgba(180, 165, 230, 0.25);
            --purple: #7c6ce0;
            --purple-light: rgba(124, 108, 224, 0.12);
            --green: #3ab89a;
            --green-light: #d1f0e6;
            --shadow-sm: 0 4px 18px rgba(100, 80, 200, 0.06);
            --shadow-md: 0 8px 30px rgba(100, 80, 200, 0.12);
        }

        body {
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== HEADER / TOPNAV ===== */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            /* 3 cột: trái | giữa | phải — không bao giờ chồng nhau */
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 60px;
            background: rgba(244, 242, 250, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            gap: 8px;
        }

        /* Cột trái: back + auth */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        /* Cột giữa: title + progress xếp chồng dọc */
        .nav-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }

        /* Cột phải: stats */
        .nav-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }

        .btn-back {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: white;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
        }

        .btn-back:hover {
            background: var(--purple-light);
            color: var(--purple);
            border-color: var(--purple);
        }

        .nav-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-main);
            background: white;
            padding: 5px 14px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: min(420px, 42vw);
        }

        .nav-progress {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-sub);
            line-height: 1;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 4px 9px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-main);
            white-space: nowrap;
        }

        .stat-pill i.fa-diamond {
            color: lightblue;
        }

        .stat-pill i.fa-star {
            color: #7c6ce0;
        }

        /* User block */
        .user-block {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-avatar-btn {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b3a4ef, #7c6ce0);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(124, 108, 224, 0.3);
            transition: transform 0.2s;
        }

        .user-avatar-btn:hover {
            transform: scale(1.08);
        }

        .user-avatar-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-display-name {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-main);
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-logout {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 100, 100, 0.1);
            border: none;
            color: #e05;
            font-size: 0.65rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255, 50, 50, 0.2);
        }

        .btn-login-hdr {
            padding: 5px 13px;
            background: var(--purple-light);
            border: none;
            border-radius: 20px;
            color: var(--purple);
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-login-hdr:hover {
            background: var(--purple);
            color: white;
        }

        .hidden {
            display: none !important;
        }

        /* ===== MODAL OVERLAY - Synced from index.html ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(30, 20, 60, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.28s, visibility 0.28s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.97), rgba(240, 235, 255, 0.98));
            border: 1px solid rgba(180, 165, 230, 0.3);
            border-radius: 24px;
            padding: 32px 28px 28px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 30px 80px rgba(80, 60, 160, 0.22);
            transform: scale(0.94) translateY(12px);
            transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(120, 100, 200, 0.08);
            border: none;
            color: var(--text-sub);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(240, 60, 100, 0.12);
            color: #e04;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 6px;
            text-align: center;
        }

        .modal-subtitle {
            font-size: 0.8rem;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(180, 165, 230, 0.35);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.25s;
        }

        .form-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124, 108, 224, 0.12);
        }

        .p-error {
            font-size: 0.7rem;
            color: #e84;
            font-weight: 700;
            margin-top: 4px;
            min-height: 14px;
            display: block;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b79de, #6a58d0);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 4px;
            box-shadow: 0 6px 20px rgba(124, 108, 224, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(124, 108, 224, 0.45);
        }

        .btn-primary:disabled {
            opacity: 0.65;
            transform: none;
            cursor: not-allowed;
        }

        .modal-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        .modal-switch a {
            color: var(--purple);
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }

        /* Profile modal specific */
        .profile-avatar-big {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b3a4ef, #7c6ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 6px 16px rgba(124, 108, 224, 0.3);
            overflow: hidden;
        }

        .profile-avatar-big img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(180, 165, 230, 0.15);
            font-size: 0.85rem;
        }

        .profile-info-label {
            width: 110px;
            font-weight: 700;
            color: var(--text-sub);
            flex-shrink: 0;
        }

        .profile-info-value {
            color: var(--text-main);
            font-weight: 600;
        }

        .btn-logout-full {
            width: 100%;
            padding: 10px;
            margin-top: 18px;
            background: rgba(240, 80, 80, 0.08);
            border: 1.5px solid rgba(240, 80, 80, 0.25);
            border-radius: 12px;
            color: #c03;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        /* ===== TOAST - Synced from index.html ===== */
        .practise-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 500;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }

        .practise-toast--show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .practise-toast--success {
            background: linear-gradient(135deg, #5fd4b5, #3ab89a);
        }

        .practise-toast--info {
            background: linear-gradient(135deg, #8b79de, #6a58d0);
        }

        .practise-toast--error {
            background: linear-gradient(135deg, #ff9eaa, #e05);
        }

        /* ===== MAIN WRAPPER ===== */
        main {
            width: 100%;
            max-width: 600px;
            padding: 24px 20px 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== TOPIC LIST VIEW ===== */
        .coupon-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .coupon-input {
            flex: 1;
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            outline: none;
            transition: border 0.2s;
        }

        .coupon-input:focus {
            border-color: var(--purple);
        }

        .btn-unlock {
            padding: 0 20px;
            background: var(--purple-light);
            border: none;
            border-radius: 12px;
            color: var(--purple);
            font-weight: 800;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-unlock:hover {
            background: var(--purple);
            color: white;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topic-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .topic-row:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: rgba(124, 108, 224, 0.3);
        }

        .topic-idx {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--purple-light);
            color: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .topic-title {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topic-kr-hint {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .topic-lock {
            font-size: 1.1rem;
            color: #ffb06b;
            flex-shrink: 0;
        }

        /* Highlight unlocked (first item fake design as screenshot) */
        .topic-row.unlocked {
            background: var(--green-light);
            border-color: var(--green);
        }

        .topic-row.unlocked .topic-title {
            color: #2a8a73;
        }

        .topic-row.unlocked .topic-idx {
            background: rgba(255, 255, 255, 0.6);
            color: #2a8a73;
        }

        .topic-row.unlocked .topic-lock {
            color: #f5a623;
        }


        /* Locked topic */
        .topic-row.locked {
            background: #fafafa;
            border-color: rgba(180, 165, 230, 0.15);
            cursor: not-allowed;
            opacity: 0.72;
        }

        .topic-row.locked:hover {
            transform: none;
            box-shadow: var(--shadow-sm);
            border-color: rgba(180, 165, 230, 0.15);
        }

        .topic-row.locked .topic-title {
            color: var(--text-muted);
        }

        .topic-row.locked .topic-idx {
            background: rgba(180, 165, 230, 0.1);
            color: var(--text-muted);
        }

        .topic-row.locked .topic-lock {
            color: #c8bfe8;
        }

        /* ===== WORDS LIST VIEW ===== */
        .words-header {
            display: grid;
            grid-template-columns: 44px 1fr 1fr;
            gap: 12px;
            padding: 0 16px 8px;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--green);
            text-transform: uppercase;
        }

        .wh-kr {
            color: var(--purple);
            background: var(--purple-light);
            padding: 4px 12px;
            border-radius: 20px;
            text-align: center;
        }

        .word-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .word-row {
            display: grid;
            grid-template-columns: 44px 1fr 1fr;
            gap: 12px;
            align-items: center;
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
        }

        .word-idx {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
            border-right: 1px solid var(--border);
            padding-right: 12px;
        }

        .word-vn-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding-left: 4px;
        }

        .w-vn-txt {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .btn-audio {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--bg);
            color: var(--text-sub);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-audio:hover {
            background: var(--purple-light);
            color: var(--purple);
        }

        .word-kr-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .word-kr-input:focus {
            border-color: var(--purple);
            background: white;
            box-shadow: 0 0 0 3px var(--purple-light);
        }

        .word-kr-input::placeholder {
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Validation States */
        .word-kr-input.success {
            border-color: var(--green);
            background: #e8f7f3;
            color: #1a6b58;
        }

        .word-kr-input.error {
            border-color: #f0607a;
            background: #fff0f2;
            color: #c0392b;
        }

        /* Hỗ trợ view transition */
        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.3);
            }

            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.05);
            }

            70% {
                transform: translateX(-50%) scale(0.9);
            }

            100% {
                transform: translateX(-50%) scale(1);
            }
        }

        /* Loader */
        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .loader i {
            color: var(--purple);
            font-size: 1.5rem;
            margin-bottom: 12px;
            display: block;
        }

        /* ===== KOREAN KEYBOARD ===== */
        #kr-keyboard {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 150;
            background: rgba(237, 233, 248, 0.97);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            box-shadow: 0 -6px 32px rgba(100, 80, 200, 0.12);
            padding: 10px 8px 20px;
            user-select: none;
        }

        #kr-keyboard.kb-visible {
            display: block;
        }

        .kb-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .kb-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .kb-close {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(124, 108, 224, 0.1);
            border: none;
            color: var(--purple);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .kb-close:hover {
            background: rgba(124, 108, 224, 0.22);
        }

        .kb-rows {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .kb-key {
            height: 44px;
            border-radius: 10px;
            border: 1px solid rgba(180, 165, 230, 0.3);
            background: white;
            box-shadow: 0 2px 0 rgba(180, 165, 230, 0.45);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.07s;
            position: relative;
            flex: 1;
            max-width: 54px;
            min-width: 30px;
            padding: 0 2px;
        }

        .kb-key:active,
        .kb-key.kb-pressed {
            transform: translateY(1px);
            box-shadow: 0 1px 0 rgba(180, 165, 230, 0.3);
            background: var(--purple-light);
        }

        .kb-shift-char {
            position: absolute;
            top: 3px;
            left: 5px;
            font-size: 0.52rem;
            color: var(--purple);
            font-weight: 800;
            line-height: 1;
        }

        .kb-key.kb-shift {
            background: var(--purple-light);
            color: var(--purple);
            font-size: 0.78rem;
            font-weight: 800;
            flex: 1.5;
            max-width: 66px;
        }

        .kb-key.kb-shift.kb-on {
            background: var(--purple);
            color: white;
            box-shadow: 0 2px 8px rgba(124, 108, 224, 0.4);
        }

        .kb-key.kb-back {
            background: rgba(240, 96, 122, 0.08);
            color: #e05;
            font-size: 1rem;
            flex: 1.5;
            max-width: 66px;
        }

        .kb-key.kb-back:active {
            background: rgba(240, 96, 122, 0.18);
        }

        .kb-key.kb-space {
            flex: 5;
            max-width: 240px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-sub);
            letter-spacing: 0.04em;
        }

        .kb-key.kb-enter {
            background: linear-gradient(135deg, #8b79de, #7c6ce0);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            flex: 2;
            max-width: 80px;
            letter-spacing: 0.03em;
            box-shadow: 0 2px 0 #5a4aaa, 0 4px 12px rgba(124, 108, 224, 0.25);
        }

        .kb-key.kb-enter:active {
            box-shadow: 0 1px 0 #5a4aaa;
            transform: translateY(1px);
        }

        body.kb-open main {
            padding-bottom: 240px;
        }

        /* Toggle bàn phím */
        .btn-kb-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: white;
            color: var(--text-sub);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
        }

        .btn-kb-toggle:hover {
            border-color: var(--purple);
            color: var(--purple);
            background: var(--purple-light);
        }

        .btn-kb-toggle.kb-toggle-on {
            background: var(--purple);
            color: white;
            border-color: var(--purple);
            box-shadow: 0 2px 8px rgba(124, 108, 224, 0.35);
        }

        .btn-kb-toggle .kb-toggle-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .btn-kb-toggle.kb-toggle-on .kb-toggle-dot {
            background: rgba(255, 255, 255, 0.8);
        }
    </style>

    <!-- KOREAN KEYBOARD -->
    <div id="kr-keyboard" onmousedown="event.preventDefault()">
        <div class="kb-topbar">
            <span class="kb-label">&#9000; Bàn phím tiếng Hàn</span>
            <button class="kb-close" onclick="KBD.close()" title="Đóng bàn phím">&#10005;</button>
        </div>
        <div class="kb-rows" id="kb-rows"></div>
    </div>

    <script>
        // ===== HANGUL KEYBOARD =====
        const KBD = (() => {
            // Layout: [normal, shifted]
            const ROWS = [
                [['ㅂ', 'ㅃ'], ['ㅈ', 'ㅉ'], ['ㄷ', 'ㄸ'], ['ㄱ', 'ㄲ'], ['ㅅ', 'ㅆ'], ['ㅛ'], ['ㅕ'], ['ㅑ'], ['ㅐ', 'ㅒ'], ['ㅔ', 'ㅖ']],
                [['ㅁ'], ['ㄴ'], ['ㅇ'], ['ㄹ'], ['ㅎ'], ['ㅗ'], ['ㅓ'], ['ㅏ'], ['ㅣ']],
                ['SHIFT', ['ㅋ'], ['ㅌ'], ['ㅊ'], ['ㅍ'], ['ㅠ'], ['ㅜ'], ['ㅡ'], 'BACK'],
                ['SPACE', 'ENTER']
            ];

            // Hangul composition tables
            const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
            const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

            // Jong combos: jong + new_cho → [split_jong, new_cho_idx]
            const JONG_SPLIT = {
                'ㄳ': ['ㄱ', 'ㅅ'], 'ㄵ': ['ㄴ', 'ㅈ'], 'ㄶ': ['ㄴ', 'ㅎ'],
                'ㄺ': ['ㄹ', 'ㄱ'], 'ㄻ': ['ㄹ', 'ㅁ'], 'ㄼ': ['ㄹ', 'ㅂ'],
                'ㄽ': ['ㄹ', 'ㅅ'], 'ㄾ': ['ㄹ', 'ㅌ'], 'ㄿ': ['ㄹ', 'ㅍ'],
                'ㅀ': ['ㄹ', 'ㅎ'], 'ㅄ': ['ㅂ', 'ㅅ']
            };

            // Jong combinations: jong + consonant → compound jong
            const JONG_COMBO = {
                'ㄱ+ㅅ': 'ㄳ', 'ㄴ+ㅈ': 'ㄵ', 'ㄴ+ㅎ': 'ㄶ',
                'ㄹ+ㄱ': 'ㄺ', 'ㄹ+ㅁ': 'ㄻ', 'ㄹ+ㅂ': 'ㄼ',
                'ㄹ+ㅅ': 'ㄽ', 'ㄹ+ㅌ': 'ㄾ', 'ㄹ+ㅍ': 'ㄿ',
                'ㄹ+ㅎ': 'ㅀ', 'ㅂ+ㅅ': 'ㅄ'
            };

            // Vowel combos (for ㅗ/ㅜ/ㅡ + another vowel)
            const VOWEL_COMBO = {
                'ㅗ+ㅏ': 'ㅘ', 'ㅗ+ㅐ': 'ㅙ', 'ㅗ+ㅣ': 'ㅚ',
                'ㅜ+ㅓ': 'ㅝ', 'ㅜ+ㅔ': 'ㅞ', 'ㅜ+ㅣ': 'ㅟ',
                'ㅡ+ㅣ': 'ㅢ'
            };

            const isCho = c => CHO.includes(c);
            const isJung = c => JUNG.includes(c);

            function compose(cho, jung, jong) {
                return String.fromCharCode(0xAC00 + CHO.indexOf(cho) * 21 * 28 + JUNG.indexOf(jung) * 28 + JONG.indexOf(jong));
            }

            function decompose(ch) {
                const code = ch.charCodeAt(0) - 0xAC00;
                if (code < 0 || code > 11171) return null;
                const jong = JONG[code % 28];
                const jung = JUNG[Math.floor(code / 28) % 21];
                const cho = CHO[Math.floor(code / 28 / 21)];
                return { cho, jung, jong };
            }

            let activeInput = null;
            let shifted = false;
            let kbEnabled = localStorage.getItem('kr-kb-enabled') !== 'false'; // mặc định bật

            // Build keyboard DOM
            function buildUI() {
                const container = document.getElementById('kb-rows');
                ROWS.forEach(row => {
                    const rowEl = document.createElement('div');
                    rowEl.className = 'kb-row';
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'kb-key';
                        if (key === 'SHIFT') {
                            btn.className += ' kb-shift';
                            btn.id = 'kb-shift-btn';
                            btn.innerHTML = '⇧ Shift';
                            btn.addEventListener('click', toggleShift);
                        } else if (key === 'BACK') {
                            btn.className += ' kb-back';
                            btn.innerHTML = '⌫';
                            btn.addEventListener('click', doBackspace);
                        } else if (key === 'SPACE') {
                            btn.className += ' kb-space';
                            btn.textContent = 'SPACE';
                            btn.addEventListener('click', () => insertChar(' '));
                        } else if (key === 'ENTER') {
                            btn.className += ' kb-enter';
                            btn.textContent = 'ENTER';
                            btn.addEventListener('click', doEnter);
                        } else {
                            const normal = key[0];
                            const shifted = key[1] || null;
                            btn.textContent = normal;
                            if (shifted) {
                                const small = document.createElement('span');
                                small.className = 'kb-shift-char';
                                small.textContent = shifted;
                                btn.appendChild(small);
                            }
                            btn.dataset.normal = normal;
                            btn.dataset.shifted = shifted || normal;
                            btn.addEventListener('click', () => {
                                const ch = isShifted() ? btn.dataset.shifted : btn.dataset.normal;
                                insertChar(ch);
                                if (isShifted()) { setShift(false); }
                            });
                        }
                        rowEl.appendChild(btn);
                    });
                    container.appendChild(rowEl);
                });
            }

            function isShifted() { return shifted; }
            function setShift(val) {
                shifted = val;
                const btn = document.getElementById('kb-shift-btn');
                if (btn) btn.classList.toggle('kb-on', shifted);
            }
            function toggleShift() { setShift(!shifted); }

            // ── Hangul composer ──
            function insertChar(ch) {
                if (!activeInput || activeInput.readOnly) return;

                const input = activeInput;
                const pos = input.selectionStart;
                const val = input.value;

                if (ch === ' ') {
                    input.value = val.slice(0, pos) + ' ' + val.slice(pos);
                    setPos(input, pos + 1);
                    return;
                }

                if (!isCho(ch) && !isJung(ch)) {
                    // Non-hangul char, just insert
                    input.value = val.slice(0, pos) + ch + val.slice(pos);
                    setPos(input, pos + 1);
                    return;
                }

                if (pos === 0) {
                    // At start
                    if (isCho(ch)) {
                        input.value = ch + val.slice(pos);
                        setPos(input, 1);
                    } else {
                        input.value = ch + val.slice(pos);
                        setPos(input, 1);
                    }
                    return;
                }

                const prev = val[pos - 1];
                const prevCode = prev.charCodeAt(0);
                const isHangulSyll = prevCode >= 0xAC00 && prevCode <= 0xD7A3;
                const isJamo = CHO.includes(prev) || JUNG.includes(prev) || JONG.includes(prev);

                if (isJung(ch)) {
                    if (isHangulSyll) {
                        const d = decompose(prev);
                        if (!d.jong) {
                            // cho+jung: add vowel combo?
                            const combo = VOWEL_COMBO[d.jung + '+' + ch];
                            if (combo) {
                                input.value = val.slice(0, pos - 1) + compose(d.cho, combo, '') + val.slice(pos);
                                setPos(input, pos);
                            } else {
                                // No combo: just append as new syllable (need a cho)
                                input.value = val.slice(0, pos) + ch + val.slice(pos);
                                setPos(input, pos + 1);
                            }
                        } else {
                            // Has jong → split jong off, jong becomes new cho + vowel
                            const jongChar = d.jong;
                            const splitInfo = JONG_SPLIT[jongChar];
                            let newCho, newJong;
                            if (splitInfo) {
                                // compound jong: first part stays, second becomes new cho
                                newJong = splitInfo[0];
                                newCho = splitInfo[1];
                            } else {
                                newJong = '';
                                newCho = jongChar;
                            }
                            if (CHO.includes(newCho)) {
                                const newSyll = compose(d.cho, d.jung, newJong);
                                const nextSyll = compose(newCho, ch, '');
                                input.value = val.slice(0, pos - 1) + newSyll + nextSyll + val.slice(pos);
                                setPos(input, pos + 1);
                            } else {
                                input.value = val.slice(0, pos) + ch + val.slice(pos);
                                setPos(input, pos + 1);
                            }
                        }
                    } else if (CHO.includes(prev)) {
                        // lone consonant → make syllable
                        if (CHO.includes(prev)) {
                            input.value = val.slice(0, pos - 1) + compose(prev, ch, '') + val.slice(pos);
                            setPos(input, pos);
                        } else {
                            input.value = val.slice(0, pos) + ch + val.slice(pos);
                            setPos(input, pos + 1);
                        }
                    } else {
                        input.value = val.slice(0, pos) + ch + val.slice(pos);
                        setPos(input, pos + 1);
                    }
                } else {
                    // Inserting a consonant
                    if (isHangulSyll) {
                        const d = decompose(prev);
                        if (!d.jong) {
                            // try to add as jong
                            if (JONG.includes(ch)) {
                                input.value = val.slice(0, pos - 1) + compose(d.cho, d.jung, ch) + val.slice(pos);
                                setPos(input, pos);
                            } else {
                                input.value = val.slice(0, pos) + ch + val.slice(pos);
                                setPos(input, pos + 1);
                            }
                        } else {
                            // already has jong → try compound jong
                            const combo = JONG_COMBO[d.jong + '+' + ch];
                            if (combo) {
                                input.value = val.slice(0, pos - 1) + compose(d.cho, d.jung, combo) + val.slice(pos);
                                setPos(input, pos);
                            } else {
                                // Can't combine → new lone consonant
                                input.value = val.slice(0, pos) + ch + val.slice(pos);
                                setPos(input, pos + 1);
                            }
                        }
                    } else {
                        // Not a syllable before → lone consonant
                        input.value = val.slice(0, pos) + ch + val.slice(pos);
                        setPos(input, pos + 1);
                    }
                }

                input.dispatchEvent(new Event('input'));
            }

            function doBackspace() {
                if (!activeInput || activeInput.readOnly) return;
                const input = activeInput;
                const pos = input.selectionStart;
                const val = input.value;
                if (pos === 0) return;

                const prev = val[pos - 1];
                const prevCode = prev.charCodeAt(0);
                const isHangulSyll = prevCode >= 0xAC00 && prevCode <= 0xD7A3;

                if (isHangulSyll) {
                    const d = decompose(prev);
                    if (d.jong) {
                        // Remove jong (or un-compound it)
                        const splitInfo = JONG_SPLIT[d.jong];
                        if (splitInfo) {
                            // compound: remove last part of compound
                            const newJong = JONG.indexOf(splitInfo[0]) > 0 ? splitInfo[0] : '';
                            input.value = val.slice(0, pos - 1) + compose(d.cho, d.jung, newJong) + val.slice(pos);
                        } else {
                            input.value = val.slice(0, pos - 1) + compose(d.cho, d.jung, '') + val.slice(pos);
                        }
                        setPos(input, pos);
                    } else {
                        // Remove jung → leave lone cho
                        // Check if vowel combo, un-combine it
                        const jungs = Object.entries(VOWEL_COMBO).find(([, v]) => v === d.jung);
                        if (jungs) {
                            const parts = jungs[0].split('+');
                            input.value = val.slice(0, pos - 1) + compose(d.cho, parts[0], '') + val.slice(pos);
                            setPos(input, pos);
                        } else {
                            input.value = val.slice(0, pos - 1) + d.cho + val.slice(pos);
                            setPos(input, pos);
                        }
                    }
                } else {
                    input.value = val.slice(0, pos - 1) + val.slice(pos);
                    setPos(input, pos - 1);
                }
                input.dispatchEvent(new Event('input'));
            }

            function doEnter() {
                if (!activeInput) return;
                const event = new KeyboardEvent('keydown', { key: 'Enter', bubbles: true });
                activeInput.dispatchEvent(event);
            }

            function setPos(input, pos) {
                input.setSelectionRange(pos, pos);
                input.focus();
            }

            function open(inputEl) {
                if (!kbEnabled) return;
                activeInput = inputEl;
                document.getElementById('kr-keyboard').classList.add('kb-visible');
                document.body.classList.add('kb-open');
            }

            function close() {
                document.getElementById('kr-keyboard').classList.remove('kb-visible');
                document.body.classList.remove('kb-open');
                activeInput = null;
            }

            function init() {
                buildUI();
                updateToggleUI();
                // Hook all kr inputs (present + future via delegation)
                document.addEventListener('focusin', e => {
                    if (e.target.classList.contains('word-kr-input') && !e.target.readOnly) {
                        open(e.target);
                    }
                });
                // Đóng bàn phím khi click ra ngoài (không phải input hoặc keyboard)
                document.addEventListener('click', e => {
                    const kb = document.getElementById('kr-keyboard');
                    if (!e.target.classList.contains('word-kr-input') && !kb.contains(e.target)) {
                        close();
                    }
                });
            }

            function updateToggleUI() {
                const btn = document.getElementById('btn-kb-toggle');
                const lbl = document.getElementById('kb-toggle-label');
                if (!btn) return;
                btn.classList.toggle('kb-toggle-on', kbEnabled);
                lbl.textContent = kbEnabled ? '한 켜짐' : '한 꺼짐';
            }

            function toggleEnabled() {
                kbEnabled = !kbEnabled;
                localStorage.setItem('kr-kb-enabled', kbEnabled);
                updateToggleUI();
                if (!kbEnabled) close();
            }

            return { init, open, close, insertChar, toggleEnabled };
        })();

        document.addEventListener('DOMContentLoaded', () => { KBD.init(); KBD.toggleEnabled && (KBD.toggleEnabled = KBD.toggleEnabled); });
    </script>

</body>
