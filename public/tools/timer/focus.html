  <script>
    // ── Intercept fetch/XHR/Image/Audio để:
    //    1. Chặn CORS tới accounts.flocus.com → trả noop JSON
    //    2. Rebase resource hash URLs từ /resources/ (webpack absolute)
    //       → đúng thư mục tương đối với trang này
    (function () {
      // Base path của trang: vd. "http://127.0.0.1:5500/2937/.../app.flocus.com/"
      var BASE_PATH = (function () {
        var h = window.location.href.split('?')[0];
        return h.substring(0, h.lastIndexOf('/') + 1);
      })();

      var HASH_RE = /^([a-f0-9]{20,})\.(jpg|mp4|mp3|png|svg|woff2?)$/i;

      // Lấy chuỗi URL từ bất kỳ dạng input nào (string / URL object / Request)
      function extractUrl(input) {
        if (!input) return '';
        if (typeof input === 'string') return input;
        try { if (input instanceof URL) return input.href; } catch (e) { }
        try { if (typeof input.url === 'string') return input.url; } catch (e) { }
        return String(input);
      }

      function fixResourceUrl(url) {
        if (!url || typeof url !== 'string') return url;

        // Trường hợp webpack public path = "/" tạo URL tuyệt đối từ gốc:
        // vd. "/resources/images/themes/abc.jpg" → BASE_PATH + "resources/images/themes/abc.jpg"
        if (/^\/resources\/(images|sounds|fonts)\//i.test(url)) {
          if (url.includes('/sounds/')) {
            var fixedS = 'https://app.flocus.com' + url;
            console.log("Loading remote sound: ", fixedS);
            return fixedS;
          }
          var fixed1 = BASE_PATH + url.slice(1);
          console.log("Loading resource: ", fixed1, " (Original: " + url + ")");
          return fixed1; // bỏ dấu / đầu, nối BASE_PATH
        }

        // Nếu đã đúng đường dẫn đầy đủ → giữ nguyên
        if (url.includes('resources/sounds/')) {
          var idx = url.indexOf('resources/sounds/');
          var fixedS2 = 'https://app.flocus.com/' + url.substring(idx);
          console.log("Loading remote sound: ", fixedS2);
          return fixedS2;
        }

        if (url.includes('resources/images/')) {
          console.log("Loading resource: ", url, " (Original: " + url + ")");
          return url;
        }

        // File hash flat (vd. "abc123.jpg" hoặc "resources/abc123.jpg")
        var file = url.split('?')[0].split('/').pop();
        if (!HASH_RE.test(file)) return url;
        var ext = file.split('.').pop().toLowerCase();
        if (ext === 'mp3') {
          var fixed2 = 'https://app.flocus.com/resources/sounds/alerts/' + file;
          console.log("Loading remote sound: ", fixed2, " (Original: " + url + ")");
          return fixed2;
        }
        if (ext === 'mp4' || ext === 'jpg' || ext === 'png') {
          var fixed3 = BASE_PATH + 'resources/images/themes/' + file;
          console.log("Loading resource: ", fixed3, " (Original: " + url + ")");
          return fixed3;
        }
        return url;
      }

      // --- Intercept XMLHttpRequest ---
      var _XHROpen = XMLHttpRequest.prototype.open;
      var _XHRSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.open = function (method, url) {
        var urlStr = extractUrl(url);
        if (urlStr && urlStr.includes('accounts.flocus.com')) {
          this._flocusNoop = true;
          var resObj = {};
          if (urlStr.includes('/settings')) {
            resObj = {
              id: "local_mock",
              updated_at: new Date().toISOString(),
              options: "{}"
            };
          } else {
            resObj = {
              status: 1, token: 'local',
              user: { subd: true, email: '', first_name: '', last_name: '', tz: 'UTC' },
              settings: {}, data: [], streaks: 0
            };
          }
          arguments[1] = 'data:application/json,' + encodeURIComponent(JSON.stringify(resObj));
        }
        return _XHROpen.apply(this, arguments);
      };

      // --- Intercept fetch ---
      var _fetch = window.fetch;
      window.fetch = function (input, init) {
        var url = extractUrl(input);
        if (url && url.includes('accounts.flocus.com')) {
          var resObj = { status: 1, data: [], streaks: 0, settings: {}, stats: {}, tasks: [] };
          if (url.includes('/tasks')) {
            resObj = []; // getTasks expects an array
          } else if (url.includes('/streak')) {
            resObj = { status: "success", streak: { current_streak: 1, max_streak: 1, valid_until: new Date(Date.now() + 86400000).toISOString() } };
          } else if (url.includes('/stats')) {
            resObj = {
              computed_at: Date.now(),
              dates: {},
              today: { pomodoro: 0, countdown: 0, stopwatch: 0, taskEta: 0, sessions: 0, shortBreak: 0, longBreak: 0, tasks: 0 },
              yesterday: { pomodoro: 0, countdown: 0, stopwatch: 0, taskEta: 0, sessions: 0, shortBreak: 0, longBreak: 0, tasks: 0 },
              sums: {
                week: { focus: 0, sessions: 0, breaks: 0, tasks: 0 },
                lastWeek: { focus: 0, sessions: 0, breaks: 0, tasks: 0 },
                month: { focus: 0, sessions: 0, breaks: 0, tasks: 0 }
              }
            };
          }
          return Promise.resolve(new Response(
            JSON.stringify(resObj),
            { status: 200, headers: { 'Content-Type': 'application/json' } }
          ));
        }
        var fixed = fixResourceUrl(url);
        if (fixed !== url) {
          input = fixed; // dùng string URL đã fix
        }
        return _fetch.call(this, input, init);
      };

      // --- Repair corrupted localStorage (from previous undefined options parsing) ---
      try {
        var ht = localStorage.getItem('flocus_homeTheme_settings');
        if (ht) {
          var p = JSON.parse(ht);
          if (!p.homeTheme) {
            p.homeTheme = 'gradient|Flare';
            localStorage.setItem('flocus_homeTheme_settings', JSON.stringify(p));
          }
        }
      } catch(e) {}


      // --- Intercept Image.src ---
      var _imgDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      if (_imgDesc && _imgDesc.set) {
        Object.defineProperty(HTMLImageElement.prototype, 'src', {
          set: function (val) { _imgDesc.set.call(this, fixResourceUrl(val)); },
          get: _imgDesc.get,
          configurable: true
        });
      }

      // --- Intercept Media.src (Video & Audio) ---
      var _mediaDesc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
      if (_mediaDesc && _mediaDesc.set) {
        Object.defineProperty(HTMLMediaElement.prototype, 'src', {
          set: function (val) { _mediaDesc.set.call(this, fixResourceUrl(val)); },
          get: _mediaDesc.get,
          configurable: true
        });
      }

      // --- Intercept Audio constructor ---
      var _Audio = window.Audio;
      window.Audio = function (url) {
        if (url) {
          return new _Audio(fixResourceUrl(url));
        }
        return new _Audio();
      };
      window.Audio.prototype = _Audio.prototype;
    })();

  <script>
    (function () {
      var SB_URL = 'https://ktqdzlhvdkerjajffgfi.supabase.co';
      var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0cWR6bGh2ZGtlcmphamZmZ2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2OTgxNTMsImV4cCI6MjA4MzI3NDE1M30.6xz0SVuj6x72VcLZyJpVtNMMWSmyOEtGhmKiVMu46xI';
      var _sb = supabase.createClient(SB_URL, SB_KEY);

      function setFocusCookies(token) {
        var exp = new Date();
        exp.setTime(exp.getTime() + 18144e5);
        var s = 'expires=' + exp.toUTCString();
        document.cookie = 'gfAccountToken=' + token + ';' + s + ';path=/';
        document.cookie = 'gfAccountStatus=subd;' + s + ';path=/';
      }

      function toFocusUser(sbUser, profile) {
        var displayName = (profile && profile.display_name)
          || (sbUser.user_metadata && sbUser.user_metadata.full_name)
          || sbUser.email;
        var parts = displayName.split(' ');
        return {
          id: sbUser.id,
          email: sbUser.email,
          first_name: parts[0] || displayName,
          last_name: parts.slice(1).join(' ') || '',
          subd: true,
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
          billingLink: null,
          display_name: displayName,
          avatar: (profile && profile.avatar) || null,
          role: (profile && profile.role) || 'user'
        };
      }

      function injectFocusLogin(sbUser, profile) {
        var fUser = toFocusUser(sbUser, profile);
        window.localStorage.setItem('gfUserAccount', JSON.stringify(fUser));
        setFocusCookies(sbUser.id);

        var acct = window.Focus && window.Focus.accounts;
        if (acct) {
          acct.settings.token = sbUser.id;
          acct.settings.subd = true;
          if (typeof acct.postLoginUserSetup === 'function') acct.postLoginUserSetup(fUser);
          document.body.classList.add('flocus-is-plus');
        }
        document.body.dispatchEvent(new CustomEvent('FocusLoggedIn', { detail: { user: fUser } }));
      }

      function patchFocusAccounts() {
        var acct = window.Focus && window.Focus.accounts;
        if (!acct) { setTimeout(patchFocusAccounts, 100); return; }

        // Auth → Supabase
        acct.logUserIn = function (email, password) {
          if (!email || !password) return;
          _sb.auth.signInWithPassword({ email: email, password: password }).then(function (res) {
            if (res.error) {
              document.body.dispatchEvent(new CustomEvent('FocusLoginError', { detail: { error: res.error } }));
              return;
            }
            var sbUser = res.data.session.user;
            _sb.from('profiles').select('display_name, avatar, role').eq('id', sbUser.id).single()
              .then(function (p) { injectFocusLogin(sbUser, p.data || null); });
          });
        };

        // Plus unlock
        acct.getUserPermissions = function () {
          document.body.classList.add('flocus-is-plus');
          return 'plus';
        };

        // Stub các API calls về accounts.flocus.com
        acct.refreshUserLogin = function () { };
        acct.getProductSettings = function () { };
        acct.createProductSettings = function () { };
        acct.getStats = function () { };
        acct.getTasks = function () { };
        acct.updateTasks = function () { };
        acct.streakIncrement = function () { };

        // Logout → sign out Supabase
        var _origLogout = acct.logUserOut.bind(acct);
        acct.logUserOut = function () {
          _sb.auth.signOut();
          _origLogout();
        };

        acct.settings.subd = true;
        document.body.classList.add('flocus-is-plus');
      }

      function tryAutoLogin() {
        _sb.auth.getSession().then(function (r) {
          var session = r.data && r.data.session;
          if (!session) return;
          var sbUser = session.user;
          _sb.from('profiles').select('display_name, avatar, role').eq('id', sbUser.id).single()
            .then(function (p) {
              var fUser = toFocusUser(sbUser, p.data || null);
              window.localStorage.setItem('gfUserAccount', JSON.stringify(fUser));
              setFocusCookies(sbUser.id);
              waitAndInject(sbUser, p.data || null);
            });
        });
      }

      function waitAndInject(sbUser, profile) {
        var acct = window.Focus && window.Focus.accounts;
        if (acct && typeof acct.postLoginUserSetup === 'function') {
          injectFocusLogin(sbUser, profile);
        } else {
          setTimeout(function () { waitAndInject(sbUser, profile); }, 150);
        }
      }

      _sb.auth.onAuthStateChange(function (_e, session) {
        if (_e === 'SIGNED_OUT') {
          window.localStorage.removeItem('gfUserAccount');
          document.cookie = 'gfAccountToken=; Max-Age=-99999999; path=/';
          document.cookie = 'gfAccountStatus=; Max-Age=-99999999; path=/';
        }
      });

      tryAutoLogin();
      patchFocusAccounts();
    })();
  </script>
