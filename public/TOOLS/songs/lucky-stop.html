<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopping Audio</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #05070f;
      color: #cbd5e1;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <span>Stopping audio...</span>
  <script>
    try {
      window.stop();
    } catch (_) {}
  </script>
</body>
</html>
